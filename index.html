  <body>
    <div id="initial-loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#172B36;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.3s ease-out;">
      <h1 style="color:#FFC801;font-family:'JetBrains Mono', monospace;font-size:2rem;">Loading...</h1>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 300);
        }
      });
    </script>
  </body>
